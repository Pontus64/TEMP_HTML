<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频房间</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

        :root {
            --bg: #0d0d14;
            --surface: #13131e;
            --border: #1f1f30;
            --accent: #7c6fff;
            --accent-dim: rgba(124, 111, 255, 0.15);
            --green: #2ecc71;
            --green-dim: rgba(46, 204, 113, 0.12);
            --red: #e74c3c;
            --text: #ddddf0;
            --muted: #55556a;
            --r: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 0;
        }

        /* ── 进入房间界面 ── */
        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            width: 100%;
            max-width: 360px;
            animation: fadeIn .4s ease;
        }

        .logo {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        .room-input-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .room-label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .room-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 600;
            padding: 16px 20px;
            letter-spacing: 3px;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: border-color .2s;
        }

        .room-input:focus {
            border-color: var(--accent);
        }

        .room-input::placeholder {
            color: var(--muted);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .hint {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            line-height: 1.7;
        }

        .join-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            padding: 16px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all .15s;
        }

        .join-btn:hover {
            background: #9085ff;
            transform: translateY(-1px);
        }

        .join-btn:active {
            transform: scale(0.98);
        }

        .join-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .random-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all .15s;
            align-self: center;
        }

        .random-btn:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        /* ── 房间界面 ── */
        #room {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            animation: fadeIn .35s ease;
        }

        #room.visible {
            display: flex;
        }

        .room-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
        }

        .room-name {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--accent);
        }

        .room-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: all .3s;
            flex-shrink: 0;
        }

        .room-status-dot.waiting {
            background: #f39c12;
            box-shadow: 0 0 8px #f39c12;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .room-status-dot.connected {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: none;
        }

        /* 参与者列表 */
        .peers-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .peers-label {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .peer-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: border-color .3s;
        }

        .peer-item.connected {
            border-color: rgba(46, 204, 113, 0.3);
        }

        .peer-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid rgba(124, 111, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            color: var(--accent);
            font-weight: 600;
        }

        .peer-avatar.green {
            background: var(--green-dim);
            border-color: rgba(46, 204, 113, 0.3);
            color: var(--green);
        }

        .peer-info {
            flex: 1;
        }

        .peer-name {
            font-size: 13px;
            font-weight: 500;
        }

        .peer-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .peer-vol {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 20px;
        }

        .vol-bar {
            width: 3px;
            border-radius: 2px;
            background: var(--muted);
            transition: height .1s, background .1s;
        }

        /* 音量可视化 */
        .speaking .vol-bar {
            background: var(--green);
        }

        .speaking .vol-bar:nth-child(1) {
            animation: vol1 .5s ease-in-out infinite;
        }

        .speaking .vol-bar:nth-child(2) {
            animation: vol2 .5s ease-in-out infinite .1s;
        }

        .speaking .vol-bar:nth-child(3) {
            animation: vol3 .5s ease-in-out infinite .2s;
        }

        .speaking .vol-bar:nth-child(4) {
            animation: vol1 .5s ease-in-out infinite .05s;
        }

        @keyframes vol1 {

            0%,
            100% {
                height: 4px
            }

            50% {
                height: 14px
            }
        }

        @keyframes vol2 {

            0%,
            100% {
                height: 8px
            }

            50% {
                height: 18px
            }
        }

        @keyframes vol3 {

            0%,
            100% {
                height: 6px
            }

            50% {
                height: 12px
            }
        }

        /* 状态消息 */
        .status-msg {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            min-height: 18px;
            letter-spacing: 0.5px;
        }

        .status-msg.ok {
            color: var(--green);
        }

        .status-msg.err {
            color: var(--red);
        }

        /* 控制按钮 */
        .controls {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 14px 10px;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--muted);
        }

        .ctrl-btn.active {
            background: rgba(231, 76, 60, 0.12);
            border-color: rgba(231, 76, 60, 0.4);
            color: var(--red);
        }

        .ctrl-btn .icon {
            font-size: 20px;
        }

        .ctrl-btn .lbl {
            font-size: 10px;
            color: var(--muted);
        }

        .ctrl-btn.active .lbl {
            color: inherit;
        }

        .leave-btn {
            width: 100%;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 10px;
            color: var(--red);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all .15s;
        }

        .leave-btn:hover {
            background: rgba(231, 76, 60, 0.18);
        }

        /* 视频区 */
        .video-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .video-wrap {
            position: relative;
            aspect-ratio: 4/3;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .video-wrap.connected {
            border-color: rgba(46, 204, 113, 0.3);
        }

        .video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-wrap .vid-label {
            position: absolute;
            bottom: 7px;
            left: 9px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.65);
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 7px;
            border-radius: 4px;
            letter-spacing: 0.8px;
            pointer-events: none;
        }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--muted);
            font-size: 11px;
        }

        .video-placeholder .vicon {
            font-size: 26px;
            opacity: 0.3;
        }

        /* 动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }
    </style>
</head>

<body>

    <!-- ── 大厅 ── -->
    <div id="lobby">
        <div class="logo">video<span>room</span></div>

        <div class="room-input-wrap">
            <div class="room-label">输入房间号</div>
            <input class="room-input" id="room-input" maxlength="6" placeholder="ABCDEF"
                oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
                onkeydown="if(event.key==='Enter')joinRoom()" />
            <div class="hint">双方输入相同的房间号即可通话<br>无需交换任何 ID</div>
        </div>

        <button class="random-btn" onclick="randomRoom()">🎲 随机生成房间号</button>
        <button class="join-btn" id="join-btn" onclick="joinRoom()">加入房间</button>

        <div class="status-msg" id="lobby-status"></div>
    </div>

    <!-- ── 房间 ── -->
    <div id="room">
        <div class="room-header">
            <div>
                <div style="font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-bottom:4px">ROOM</div>
                <div class="room-name" id="room-name-label"></div>
            </div>
            <div class="room-status-dot waiting" id="room-dot"></div>
        </div>

        <div class="peers-wrap">
            <div class="peers-label">参与者</div>
            <!-- 自己 -->
            <div class="peer-item" id="self-item">
                <div class="peer-avatar green" id="self-avatar">我</div>
                <div class="peer-info">
                    <div class="peer-name">我</div>
                    <div class="peer-sub" id="self-sub">正在连接...</div>
                </div>
                <div class="peer-vol" id="self-vol">
                    <div class="vol-bar" style="height:4px"></div>
                    <div class="vol-bar" style="height:8px"></div>
                    <div class="vol-bar" style="height:6px"></div>
                    <div class="vol-bar" style="height:4px"></div>
                </div>
            </div>
            <!-- 对方（动态插入） -->
            <div class="peer-item" id="remote-item" style="display:none">
                <div class="peer-avatar" id="remote-avatar">?</div>
                <div class="peer-info">
                    <div class="peer-name">对方</div>
                    <div class="peer-sub" id="remote-sub">等待连接...</div>
                </div>
                <div class="peer-vol" id="remote-vol">
                    <div class="vol-bar" style="height:4px"></div>
                    <div class="vol-bar" style="height:8px"></div>
                    <div class="vol-bar" style="height:6px"></div>
                    <div class="vol-bar" style="height:4px"></div>
                </div>
            </div>
        </div>

        <div class="status-msg" id="room-status">等待对方加入...</div>

        <!-- 视频区 -->
        <div class="video-grid" id="video-grid" style="display:none">
            <div class="video-wrap" id="local-wrap">
                <video id="local-video" autoplay muted playsinline></video>
                <div class="video-placeholder" id="local-ph"><span class="vicon">📷</span><span>摄像头关闭</span></div>
                <span class="vid-label">我</span>
            </div>
            <div class="video-wrap" id="remote-wrap">
                <video id="remote-video" autoplay playsinline></video>
                <div class="video-placeholder" id="remote-ph"><span class="vicon">🌐</span><span>等待对方</span></div>
                <span class="vid-label">对方</span>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()">
                <span class="icon">🎤</span>
                <span class="lbl">麦克风</span>
            </button>
            <button class="ctrl-btn" id="camera-btn" onclick="toggleCamera()">
                <span class="icon">📹</span>
                <span class="lbl">摄像头</span>
            </button>
            <button class="ctrl-btn" id="speaker-btn" onclick="toggleSpeaker()">
                <span class="icon">🔊</span>
                <span class="lbl">扬声器</span>
            </button>
        </div>

        <button class="leave-btn" onclick="leaveRoom()">← 离开房间</button>
    </div>

    <script>
        // ──────────────────────────────────────────
        // 核心思路：
        //  房间号 → 两个固定 Peer ID（host / guest）
        //  先到的人拿 host ID 等待
        //  后到的人拿 guest ID 主动呼叫 host
        //  任何一方离开后，下一个进来的人自动顶上
        // ──────────────────────────────────────────

        let peer, localStream, currentCall
        let myRole = null  // 'host' | 'guest'
        let muted = false, speakerMuted = false
        let roomCode = ''
        let audioCtx, analyserSelf, analyserRemote

        function roomToIds(code) {
            return {
                hostId: 'vr-' + code + '-host',
                guestId: 'vr-' + code + '-guest'
            }
        }

        function randomRoom() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
            let r = ''
            for (let i = 0; i < 6; i++) r += chars[Math.floor(Math.random() * chars.length)]
            document.getElementById('room-input').value = r
        }

        async function joinRoom() {
            roomCode = document.getElementById('room-input').value.trim().toUpperCase()
            if (roomCode.length < 2) {
                setLobbyStatus('房间号至少 2 位', 'err'); return
            }

            setLobbyStatus('正在获取摄像头和麦克风...')
            document.getElementById('join-btn').disabled = true

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true })
            } catch (e) {
                // 摄像头失败则降级只用麦克风
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    setLobbyStatus('摄像头不可用，仅语音模式')
                } catch (e2) {
                    setLobbyStatus('麦克风获取失败：' + e2.message, 'err')
                    document.getElementById('join-btn').disabled = false
                    return
                }
            }

            setLobbyStatus('正在连接...')
            setupSelfViz()

            const { hostId, guestId } = roomToIds(roomCode)

            // 先尝试注册为 host
            tryRegister(hostId, guestId)
        }

        function tryRegister(hostId, guestId) {
            const p = new Peer(hostId, {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                    ]
                }
            })

            p.on('open', id => {
                // 成功注册为 host
                peer = p
                myRole = 'host'
                enterRoom()
                setRoomStatus('等待对方加入...', '')
                setSelfSub('等待中')

                // 监听来电
                peer.on('call', incomingCall => {
                    handleIncomingCall(incomingCall)
                })
            })

            p.on('error', err => {
                if (err.type === 'unavailable-id') {
                    // host 位置已被占用，我是 guest
                    p.destroy()
                    registerAsGuest(hostId, guestId)
                } else {
                    setLobbyStatus('连接失败: ' + err.message, 'err')
                    document.getElementById('join-btn').disabled = false
                }
            })
        }

        function registerAsGuest(hostId, guestId) {
            const p = new Peer(guestId, {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                    ]
                }
            })

            p.on('open', id => {
                peer = p
                myRole = 'guest'
                enterRoom()
                setSelfSub('已就绪')
                setRoomStatus('正在呼叫对方...', '')
                // 主动呼叫 host
                callPeer(hostId)
            })

            p.on('error', err => {
                if (err.type === 'unavailable-id') {
                    // 房间满了（已有两人）
                    p.destroy()
                    setLobbyStatus('房间已满，请换一个房间号', 'err')
                    document.getElementById('join-btn').disabled = false
                } else {
                    setLobbyStatus('连接失败: ' + err.message, 'err')
                    document.getElementById('join-btn').disabled = false
                }
            })

            // guest 也监听来电（host 离开后重新进入时会呼 guest）
            p.on('call', incomingCall => {
                handleIncomingCall(incomingCall)
            })
        }

        function callPeer(targetId) {
            const call = peer.call(targetId, localStream)
            currentCall = call
            bindCallEvents(call)
        }

        function handleIncomingCall(incomingCall) {
            incomingCall.answer(localStream)
            if (currentCall) currentCall.close()
            currentCall = incomingCall
            bindCallEvents(incomingCall)
            setRoomStatus('通话中', 'ok')
        }

        function bindCallEvents(call) {
            call.on('stream', remoteStream => {
                playRemoteAudio(remoteStream)
                setupRemoteViz(remoteStream)
                showRemoteConnected(remoteStream)
                setRoomStatus('通话中', 'ok')
                document.getElementById('room-dot').className = 'room-status-dot connected'
            })

            call.on('close', () => {
                setRoomStatus('对方已离开，等待重新连接...', '')
                document.getElementById('room-dot').className = 'room-status-dot waiting'
                hideRemote()
            })

            call.on('error', e => {
                setRoomStatus('连接错误: ' + e, 'err')
            })

            // 监听 ICE 状态（调试用）
            call.peerConnection?.addEventListener('iceconnectionstatechange', () => {
                const s = call.peerConnection.iceConnectionState
                if (s === 'failed') {
                    setRoomStatus('NAT 穿透失败，尝试重连...', 'err')
                    // 重新呼叫
                    setTimeout(() => {
                        if (myRole === 'guest') {
                            const { hostId } = roomToIds(roomCode)
                            callPeer(hostId)
                        }
                    }, 2000)
                }
            })
        }

        // ── 音频播放 ──────────────────────────────
        let remoteAudioEl = null
        function playRemoteAudio(stream) {
            if (!remoteAudioEl) {
                remoteAudioEl = new Audio()
                remoteAudioEl.autoplay = true
                document.body.appendChild(remoteAudioEl)
            }
            remoteAudioEl.srcObject = stream
            if (speakerMuted) remoteAudioEl.muted = true
        }

        // ── 音量可视化 ────────────────────────────
        function setupSelfViz() {
            try {
                audioCtx = new AudioContext()
                const src = audioCtx.createMediaStreamSource(localStream)
                analyserSelf = audioCtx.createAnalyser()
                analyserSelf.fftSize = 256
                src.connect(analyserSelf)
                vizLoop('self-vol', analyserSelf)
            } catch (e) { }
        }

        function setupRemoteViz(stream) {
            try {
                if (!audioCtx) audioCtx = new AudioContext()
                const src = audioCtx.createMediaStreamSource(stream)
                analyserRemote = audioCtx.createAnalyser()
                analyserRemote.fftSize = 256
                src.connect(analyserRemote)
                vizLoop('remote-vol', analyserRemote)
            } catch (e) { }
        }

        function vizLoop(elId, analyser) {
            const el = document.getElementById(elId)
            const bars = el.querySelectorAll('.vol-bar')
            const data = new Uint8Array(analyser.frequencyBinCount)
            const THRESHOLD = 12

            function tick() {
                analyser.getByteFrequencyData(data)
                const avg = (data[2] + data[4] + data[6] + data[8]) / 4
                const speaking = avg > THRESHOLD
                el.parentElement.classList.toggle('speaking', speaking)
                bars.forEach((b, i) => {
                    if (!speaking) { b.style.height = [4, 8, 6, 4][i] + 'px'; return }
                    b.style.height = Math.min(20, 4 + data[i * 3] / 10) + 'px'
                    b.style.background = 'var(--green)'
                })
                requestAnimationFrame(tick)
            }
            tick()
        }

        // ── UI helpers ────────────────────────────
        function enterRoom() {
            document.getElementById('lobby').style.display = 'none'
            const r = document.getElementById('room')
            r.classList.add('visible')
            document.getElementById('room-name-label').textContent = roomCode
            // 显示本地视频
            const vt = localStream?.getVideoTracks()
            if (vt && vt.length > 0) {
                document.getElementById('video-grid').style.display = 'grid'
                const lv = document.getElementById('local-video')
                lv.srcObject = localStream
                document.getElementById('local-ph').style.display = 'none'
            }
        }

        function showRemoteConnected(remoteStream) {
            const ri = document.getElementById('remote-item')
            ri.style.display = 'flex'
            ri.classList.add('connected')
            document.getElementById('remote-sub').textContent = '通话中'
            document.getElementById('remote-avatar').textContent = '他'
            document.getElementById('remote-avatar').classList.add('green')
            // 同步更新自己的状态
            document.getElementById('self-sub').textContent = '通话中'
            document.getElementById('self-item').classList.add('connected')
            // 远端视频
            if (remoteStream) {
                document.getElementById('video-grid').style.display = 'grid'
                const rv = document.getElementById('remote-video')
                rv.srcObject = remoteStream
                document.getElementById('remote-ph').style.display = 'none'
                document.getElementById('remote-wrap').classList.add('connected')
            }
        }

        function hideRemote() {
            const ri = document.getElementById('remote-item')
            ri.style.display = 'none'
            ri.classList.remove('connected')
            document.getElementById('self-sub').textContent = '等待中'
            document.getElementById('self-item').classList.remove('connected')
            // 重置远端视频
            const rv = document.getElementById('remote-video')
            rv.srcObject = null
            document.getElementById('remote-ph').style.display = 'flex'
            document.getElementById('remote-wrap').classList.remove('connected')
        }

        function setSelfSub(t) {
            document.getElementById('self-sub').textContent = t
        }

        function setRoomStatus(msg, type) {
            const el = document.getElementById('room-status')
            el.textContent = msg
            el.className = 'status-msg' + (type ? ' ' + type : '')
        }

        function setLobbyStatus(msg, type) {
            const el = document.getElementById('lobby-status')
            el.textContent = msg
            el.className = 'status-msg' + (type ? ' ' + type : '')
        }

        // ── 控制 ──────────────────────────────────
        function toggleMute() {
            muted = !muted
            localStream?.getAudioTracks().forEach(t => t.enabled = !muted)
            const btn = document.getElementById('mute-btn')
            btn.classList.toggle('active', muted)
            btn.querySelector('.icon').textContent = muted ? '🔇' : '🎤'
            btn.querySelector('.lbl').textContent = muted ? '已静音' : '麦克风'
        }

        let cameraOff = false
        function toggleCamera() {
            cameraOff = !cameraOff
            localStream?.getVideoTracks().forEach(t => t.enabled = !cameraOff)
            const lv = document.getElementById('local-video')
            document.getElementById('local-ph').style.display = cameraOff ? 'flex' : 'none'
            const btn = document.getElementById('camera-btn')
            btn.classList.toggle('active', cameraOff)
            btn.querySelector('.icon').textContent = cameraOff ? '🚫' : '📹'
            btn.querySelector('.lbl').textContent = cameraOff ? '已关闭' : '摄像头'
        }


        speakerMuted = !speakerMuted
        if (remoteAudioEl) remoteAudioEl.muted = speakerMuted
        const btn = document.getElementById('speaker-btn')
        btn.classList.toggle('active', speakerMuted)
        btn.querySelector('.icon').textContent = speakerMuted ? '🔕' : '🔊'
        btn.querySelector('.lbl').textContent = speakerMuted ? '已静音' : '扬声器'
}

        function leaveRoom() {
            currentCall?.close()
            peer?.destroy()
            localStream?.getTracks().forEach(t => t.stop())
            if (remoteAudioEl) { remoteAudioEl.srcObject = null }
            audioCtx?.close()
            // 重置状态
            peer = localStream = currentCall = myRole = audioCtx = null
            muted = speakerMuted = cameraOff = false
            roomCode = ''
            // 回大厅
            document.getElementById('room').classList.remove('visible')
            document.getElementById('lobby').style.display = 'flex'
            document.getElementById('join-btn').disabled = false
            document.getElementById('room-input').value = ''
            setLobbyStatus('')
            // 重置按钮状态
            document.getElementById('camera-btn').classList.remove('active')
            document.getElementById('camera-btn').querySelector('.icon').textContent = '📹'
            document.getElementById('local-video').srcObject = null
            document.getElementById('remote-video').srcObject = null
            document.getElementById('local-ph').style.display = 'flex'
            document.getElementById('remote-ph').style.display = 'flex'
            document.getElementById('video-grid').style.display = 'none'
            document.getElementById('mute-btn').classList.remove('active')
            document.getElementById('mute-btn').querySelector('.icon').textContent = '🎤'
            document.getElementById('speaker-btn').classList.remove('active')
            document.getElementById('speaker-btn').querySelector('.icon').textContent = '🔊'
        }
    </script>
</body>

</html>
