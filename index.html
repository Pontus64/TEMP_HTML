<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频房间</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

        :root {
            --bg: #0d0d14;
            --surface: #13131e;
            --border: #1f1f30;
            --accent: #7c6fff;
            --green: #2ecc71;
            --red: #e74c3c;
            --text: #ddddf0;
            --muted: #55556a;
            --r: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px
        }

        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
            max-width: 360px;
            animation: fadeIn .4s ease
        }

        .logo {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase
        }

        .logo span {
            color: var(--accent)
        }

        .rinput {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 600;
            padding: 16px 20px;
            letter-spacing: 3px;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: border-color .2s
        }

        .rinput:focus {
            border-color: var(--accent)
        }

        .rinput::placeholder {
            color: var(--muted);
            font-weight: 300;
            letter-spacing: 2px
        }

        .hint {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            line-height: 1.7
        }

        .join-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            padding: 16px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all .15s
        }

        .join-btn:hover {
            background: #9085ff;
            transform: translateY(-1px)
        }

        .join-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none
        }

        .rand-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all .15s;
            align-self: center
        }

        .rand-btn:hover {
            color: var(--text);
            border-color: var(--muted)
        }

        #room {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 420px;
            animation: fadeIn .35s ease
        }

        #room.vis {
            display: flex
        }

        .rhead {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r)
        }

        .rname {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--accent)
        }

        .rdot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: all .3s;
            flex-shrink: 0
        }

        .rdot.w {
            background: #f39c12;
            box-shadow: 0 0 8px #f39c12;
            animation: pulse 1.4s ease-in-out infinite
        }

        .rdot.c {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: none
        }

        .vgrid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        .vwrap {
            position: relative;
            aspect-ratio: 4/3;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden
        }

        .vwrap.on {
            border-color: rgba(46, 204, 113, 0.4)
        }

        .vwrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #000
        }

        .vlbl {
            position: absolute;
            bottom: 7px;
            left: 9px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.55);
            padding: 2px 7px;
            border-radius: 4px;
            letter-spacing: .8px;
            pointer-events: none;
            z-index: 2
        }

        .vph {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--muted);
            font-size: 11px;
            z-index: 1;
            pointer-events: none
        }

        .vph .ic {
            font-size: 24px;
            opacity: .3
        }

        /* 解锁音频横幅 */
        #unlock-bar {
            width: 100%;
            background: rgba(124, 111, 255, 0.15);
            border: 1px solid rgba(124, 111, 255, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            display: none;
            align-items: center;
            gap: 10px;
            cursor: pointer
        }

        #unlock-bar:hover {
            background: rgba(124, 111, 255, 0.22)
        }

        #unlock-bar span {
            font-size: 12px;
            color: var(--accent)
        }

        .pwrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .plbl {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1.5px;
            text-transform: uppercase
        }

        .pitem {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: border-color .3s
        }

        .pitem.on {
            border-color: rgba(46, 204, 113, 0.3)
        }

        .av {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(124, 111, 255, 0.15);
            border: 1px solid rgba(124, 111, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            color: var(--accent);
            font-weight: 600
        }

        .av.g {
            background: rgba(46, 204, 113, 0.12);
            border-color: rgba(46, 204, 113, .3);
            color: var(--green)
        }

        .pinfo {
            flex: 1
        }

        .pname {
            font-size: 13px;
            font-weight: 500
        }

        .psub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        .vol {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 20px
        }

        .vb {
            width: 3px;
            border-radius: 2px;
            background: var(--muted)
        }

        .speaking .vb {
            background: var(--green)
        }

        .speaking .vb:nth-child(1) {
            animation: v1 .5s ease-in-out infinite
        }

        .speaking .vb:nth-child(2) {
            animation: v2 .5s ease-in-out infinite .1s
        }

        .speaking .vb:nth-child(3) {
            animation: v3 .5s ease-in-out infinite .2s
        }

        .speaking .vb:nth-child(4) {
            animation: v1 .5s ease-in-out infinite .05s
        }

        .smsg {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            min-height: 18px;
            letter-spacing: .5px
        }

        .smsg.ok {
            color: var(--green)
        }

        .smsg.err {
            color: var(--red)
        }

        .ctrls {
            width: 100%;
            display: flex;
            gap: 8px
        }

        .ctrl {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 12px 6px;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px
        }

        .ctrl:hover {
            background: rgba(255, 255, 255, .04);
            border-color: var(--muted)
        }

        .ctrl.off {
            background: rgba(231, 76, 60, .1);
            border-color: rgba(231, 76, 60, .35);
            color: var(--red)
        }

        .ctrl .ic {
            font-size: 18px
        }

        .ctrl .lb {
            font-size: 10px;
            color: var(--muted)
        }

        .ctrl.off .lb {
            color: inherit
        }

        .lbtn {
            width: 100%;
            background: rgba(231, 76, 60, .1);
            border: 1px solid rgba(231, 76, 60, .3);
            border-radius: 10px;
            color: var(--red);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            padding: 13px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all .15s
        }

        .lbtn:hover {
            background: rgba(231, 76, 60, .18)
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        @keyframes v1 {

            0%,
            100% {
                height: 4px
            }

            50% {
                height: 14px
            }
        }

        @keyframes v2 {

            0%,
            100% {
                height: 8px
            }

            50% {
                height: 18px
            }
        }

        @keyframes v3 {

            0%,
            100% {
                height: 6px
            }

            50% {
                height: 12px
            }
        }
    </style>
</head>

<body>

    <!-- 隐藏的 audio 元素，避免自动播放被拦截 -->
    <audio id="remote-audio" autoplay playsinline style="display:none"></audio>

    <div id="lobby">
        <div class="logo">video<span>room</span></div>
        <div style="width:100%;display:flex;flex-direction:column;gap:10px">
            <div style="font-size:11px;color:var(--muted);letter-spacing:1px">输入房间号</div>
            <input class="rinput" id="rinput" maxlength="6" placeholder="ABCDEF"
                oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
                onkeydown="if(event.key==='Enter')joinRoom()" />
            <div class="hint">双方输入相同的房间号即可通话<br>无需交换任何 ID</div>
        </div>
        <button class="rand-btn" onclick="randomRoom()">🎲 随机生成房间号</button>
        <button class="join-btn" id="join-btn" onclick="joinRoom()">加入房间</button>
        <div class="smsg" id="lmsg"></div>
    </div>

    <div id="room">
        <div class="rhead">
            <div>
                <div style="font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-bottom:4px">ROOM</div>
                <div class="rname" id="rlabel"></div>
            </div>
            <div class="rdot w" id="rdot"></div>
        </div>

        <!-- 点击解锁音频 -->
        <div id="unlock-bar" onclick="unlockAudio()">
            <span>🔇 点击此处开启声音</span>
        </div>

        <div class="vgrid">
            <div class="vwrap" id="lwrap">
                <video id="lvid" autoplay muted playsinline></video>
                <div class="vph" id="lph"><span class="ic">📷</span><span>摄像头关闭</span></div>
                <span class="vlbl">我</span>
            </div>
            <div class="vwrap" id="rwrap">
                <video id="rvid" autoplay playsinline></video>
                <div class="vph" id="rph"><span class="ic">🌐</span><span>等待对方</span></div>
                <span class="vlbl">对方</span>
            </div>
        </div>

        <div class="pwrap">
            <div class="plbl">参与者</div>
            <div class="pitem" id="sitem">
                <div class="av g">我</div>
                <div class="pinfo">
                    <div class="pname">我</div>
                    <div class="psub" id="ssub">等待中</div>
                </div>
                <div class="vol" id="svol">
                    <div class="vb" style="height:4px"></div>
                    <div class="vb" style="height:8px"></div>
                    <div class="vb" style="height:6px"></div>
                    <div class="vb" style="height:4px"></div>
                </div>
            </div>
            <div class="pitem" id="ritem" style="display:none">
                <div class="av g">他</div>
                <div class="pinfo">
                    <div class="pname">对方</div>
                    <div class="psub">通话中</div>
                </div>
                <div class="vol" id="rvol">
                    <div class="vb" style="height:4px"></div>
                    <div class="vb" style="height:8px"></div>
                    <div class="vb" style="height:6px"></div>
                    <div class="vb" style="height:4px"></div>
                </div>
            </div>
        </div>

        <div class="smsg" id="rmsg">等待对方加入...</div>
        <div class="ctrls">
            <button class="ctrl" id="bmic" onclick="toggleMic()"><span class="ic">🎤</span><span
                    class="lb">麦克风</span></button>
            <button class="ctrl" id="bcam" onclick="toggleCam()"><span class="ic">📹</span><span
                    class="lb">摄像头</span></button>
            <button class="ctrl" id="bspk" onclick="toggleSpk()"><span class="ic">🔊</span><span
                    class="lb">扬声器</span></button>
        </div>
        <button class="lbtn" onclick="leaveRoom()">← 离开房间</button>
    </div>

    <script>
        var peer, localStream, currentCall, audioCtx
        var micOff = false, camOff = false, spkOff = false
        var roomCode = ''
        var pendingRemoteStream = null

        function ids(c) { return { h: 'vr4-' + c + '-h', g: 'vr4-' + c + '-g' } }

        function randomRoom() {
            var ch = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', r = ''
            for (var i = 0; i < 6; i++) r += ch[Math.floor(Math.random() * ch.length)]
            document.getElementById('rinput').value = r
        }

        function joinRoom() {
            roomCode = document.getElementById('rinput').value.trim().toUpperCase()
            if (roomCode.length < 2) { lmsg('房间号至少2位', 'err'); return }
            document.getElementById('join-btn').disabled = true
            lmsg('正在获取摄像头...')
            navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                .then(startWithStream)
                .catch(function () {
                    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                        .then(function (s) { lmsg('仅语音模式'); startWithStream(s) })
                        .catch(function (e) {
                            lmsg('获取失败:' + e.message, 'err')
                            document.getElementById('join-btn').disabled = false
                        })
                })
        }

        function startWithStream(stream) {
            localStream = stream
            setupSelfViz()
            lmsg('正在连接...')
            var id = ids(roomCode)
            mkPeer(id.h,
                function () {
                    enterRoom()
                    ssub('等待中')
                    rmsg('等待对方加入...')
                    peer.on('call', answerCall)
                },
                function () {
                    mkPeer(id.g,
                        function () {
                            enterRoom()
                            ssub('连接中...')
                            rmsg('呼叫对方...')
                            peer.on('call', answerCall)
                            callTo(id.h)
                        },
                        function () { lmsg('房间已满，请换房间号', 'err'); document.getElementById('join-btn').disabled = false }
                    )
                }
            )
        }

        function mkPeer(pid, onOpen, onFail) {
            var p = new Peer(pid, {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            })
            p.on('open', function () { peer = p; onOpen() })
            p.on('error', function (e) {
                p.destroy()
                if (e.type === 'unavailable-id') { onFail(); return }
                lmsg('连接失败:' + e.type, 'err')
                document.getElementById('join-btn').disabled = false
            })
        }

        function callTo(tid) {
            var c = peer.call(tid, localStream)
            currentCall = c
            bindCall(c)
        }

        function answerCall(c) {
            c.answer(localStream)
            if (currentCall) currentCall.close()
            currentCall = c
            bindCall(c)
        }

        function bindCall(c) {
            c.on('stream', function (rs) {
                console.log('收到 remote stream, 视频轨:', rs.getVideoTracks().length, '音频轨:', rs.getAudioTracks().length)
                setRemoteStream(rs)
                showRemote(rs)
                rmsg('通话中', 'ok')
                document.getElementById('rdot').className = 'rdot c'
            })
            c.on('close', function () {
                rmsg('对方已离开，等待重新连接...')
                document.getElementById('rdot').className = 'rdot w'
                hideRemote()
            })
            if (c.peerConnection) {
                c.peerConnection.addEventListener('iceconnectionstatechange', function () {
                    var s = c.peerConnection.iceConnectionState
                    console.log('ICE state:', s)
                    if (s === 'failed') {
                        rmsg('重连中...', 'err')
                        setTimeout(function () { callTo(ids(roomCode).h) }, 2000)
                    }
                })
                // 监听新轨道（某些浏览器 stream 事件不可靠）
                c.peerConnection.addEventListener('track', function (e) {
                    console.log('收到 track:', e.track.kind)
                    var streams = e.streams
                    if (streams && streams.length > 0) setRemoteStream(streams[0])
                })
            }
        }

        // 核心：设置远端流到 video 和 audio
        function setRemoteStream(rs) {
            // 视频：先 muted 让浏览器允许 autoplay
            var rvid = document.getElementById('rvid')
            rvid.muted = true
            rvid.srcObject = rs
            rvid.play().then(function () {
                // 视频画面起来了，保持 muted（声音走独立 audio 标签）
                document.getElementById('rph').style.display = 'none'
                document.getElementById('rwrap').classList.add('on')
            }).catch(function (e) {
                console.log('video play err:', e)
                pendingRemoteStream = rs
                document.getElementById('unlock-bar').style.display = 'flex'
            })

            // 音频独立走 <audio> 标签，不走 video，避免回声
            var raudio = document.getElementById('remote-audio')
            raudio.muted = false
            raudio.srcObject = rs
            var p = raudio.play()
            if (p !== undefined) {
                p.catch(function () {
                    pendingRemoteStream = rs
                    document.getElementById('unlock-bar').style.display = 'flex'
                })
            }

            setupRemoteViz(rs)
        }

        function unlockAudio() {
            var raudio = document.getElementById('remote-audio')
            if (pendingRemoteStream) raudio.srcObject = pendingRemoteStream
            raudio.play().then(function () {
                document.getElementById('unlock-bar').style.display = 'none'
            }).catch(function (e) { console.log(e) })
        }

        function setupSelfViz() {
            try {
                audioCtx = new AudioContext()
                var src = audioCtx.createMediaStreamSource(localStream)
                var a = audioCtx.createAnalyser(); a.fftSize = 256; src.connect(a)
                vizLoop('svol', a)
            } catch (e) { }
        }

        function setupRemoteViz(rs) {
            try {
                if (!audioCtx) audioCtx = new AudioContext()
                var src = audioCtx.createMediaStreamSource(rs)
                var a = audioCtx.createAnalyser(); a.fftSize = 256; src.connect(a)
                vizLoop('rvol', a)
            } catch (e) { }
        }

        function vizLoop(elId, a) {
            var el = document.getElementById(elId)
            var bars = el.querySelectorAll('.vb')
            var data = new Uint8Array(a.frequencyBinCount)
            function tick() {
                a.getByteFrequencyData(data)
                var avg = (data[2] + data[4] + data[6] + data[8]) / 4
                var sp = avg > 12
                el.parentElement.classList.toggle('speaking', sp)
                bars.forEach(function (b, i) {
                    b.style.height = (sp ? Math.min(20, 4 + data[i * 3] / 10) : [4, 8, 6, 4][i]) + 'px'
                })
                requestAnimationFrame(tick)
            }
            tick()
        }

        function enterRoom() {
            document.getElementById('lobby').style.display = 'none'
            document.getElementById('room').classList.add('vis')
            document.getElementById('rlabel').textContent = roomCode
            // 本地视频
            var lvid = document.getElementById('lvid')
            lvid.srcObject = localStream
            lvid.play().catch(function () { })
            if (localStream.getVideoTracks().length > 0) {
                document.getElementById('lph').style.display = 'none'
                document.getElementById('lwrap').classList.add('on')
            }
        }

        function showRemote(rs) {
            document.getElementById('ritem').style.display = 'flex'
            document.getElementById('ritem').classList.add('on')
            document.getElementById('ssub').textContent = '通话中'
            document.getElementById('sitem').classList.add('on')
        }

        function hideRemote() {
            document.getElementById('ritem').style.display = 'none'
            document.getElementById('ritem').classList.remove('on')
            document.getElementById('ssub').textContent = '等待中'
            document.getElementById('sitem').classList.remove('on')
            document.getElementById('rvid').srcObject = null
            document.getElementById('rph').style.display = 'flex'
            document.getElementById('rwrap').classList.remove('on')
            document.getElementById('unlock-bar').style.display = 'none'
        }

        function toggleMic() {
            micOff = !micOff
            localStream.getAudioTracks().forEach(function (t) { t.enabled = !micOff })
            var b = document.getElementById('bmic'); b.classList.toggle('off', micOff)
            b.querySelector('.ic').textContent = micOff ? '🔇' : '🎤'
            b.querySelector('.lb').textContent = micOff ? '已静音' : '麦克风'
        }

        function toggleCam() {
            camOff = !camOff
            localStream.getVideoTracks().forEach(function (t) { t.enabled = !camOff })
            document.getElementById('lph').style.display = camOff ? 'flex' : 'none'
            var b = document.getElementById('bcam'); b.classList.toggle('off', camOff)
            b.querySelector('.ic').textContent = camOff ? '🚫' : '📹'
            b.querySelector('.lb').textContent = camOff ? '已关闭' : '摄像头'
        }

        function toggleSpk() {
            spkOff = !spkOff
            document.getElementById('remote-audio').muted = spkOff
            var b = document.getElementById('bspk'); b.classList.toggle('off', spkOff)
            b.querySelector('.ic').textContent = spkOff ? '🔕' : '🔊'
            b.querySelector('.lb').textContent = spkOff ? '已静音' : '扬声器'
        }

        function leaveRoom() {
            if (currentCall) currentCall.close()
            if (peer) peer.destroy()
            if (localStream) localStream.getTracks().forEach(function (t) { t.stop() })
            var ra = document.getElementById('remote-audio'); ra.srcObject = null; ra.pause()
            if (audioCtx) audioCtx.close()
            peer = localStream = currentCall = audioCtx = pendingRemoteStream = null
            micOff = camOff = spkOff = false; roomCode = ''
            document.getElementById('room').classList.remove('vis')
            document.getElementById('lobby').style.display = 'flex'
            document.getElementById('join-btn').disabled = false
            document.getElementById('rinput').value = ''
            document.getElementById('lvid').srcObject = null
            document.getElementById('rvid').srcObject = null
            document.getElementById('lph').style.display = 'flex'
            document.getElementById('rph').style.display = 'flex'
            document.getElementById('lwrap').classList.remove('on')
            document.getElementById('rwrap').classList.remove('on')
            document.getElementById('ritem').style.display = 'none'
            document.getElementById('sitem').classList.remove('on')
            document.getElementById('ssub').textContent = '等待中'
            document.getElementById('rdot').className = 'rdot w'
            document.getElementById('unlock-bar').style.display = 'none'
            lmsg('')
                ;['bmic', 'bcam', 'bspk'].forEach(function (id) {
                    var b = document.getElementById(id); b.classList.remove('off')
                    b.querySelector('.lb').textContent = { 'bmic': '麦克风', 'bcam': '摄像头', 'bspk': '扬声器' }[id]
                })
            document.getElementById('bmic').querySelector('.ic').textContent = '🎤'
            document.getElementById('bcam').querySelector('.ic').textContent = '📹'
            document.getElementById('bspk').querySelector('.ic').textContent = '🔊'
        }

        function ssub(t) { document.getElementById('ssub').textContent = t }
        function rmsg(m, t) { var e = document.getElementById('rmsg'); e.textContent = m; e.className = 'smsg' + (t ? ' ' + t : '') }
        function lmsg(m, t) { var e = document.getElementById('lmsg'); e.textContent = m; e.className = 'smsg' + (t ? ' ' + t : '') }
    </script>
</body>

</html>
