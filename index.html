<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影师影展 | CLIENT GALLERY</title>
    <style>
        /* --- 全局重置 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sidebar-width: 280px;
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent: #d4af37;
            /* 香槟金 */
            --gap: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- 左侧导航栏 --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-panel);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .brand {
            padding: 0 25px 25px;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }

        .brand h1 {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .brand p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .nav-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        /* 滚动条美化 */
        .nav-list::-webkit-scrollbar {
            width: 4px;
        }

        .nav-list::-webkit-scrollbar-thumb {
            background: #333;
        }

        .nav-item {
            padding: 18px 25px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #252525;
        }

        .nav-item:hover {
            background-color: #2a2a2a;
        }

        .nav-item.active {
            background-color: #252525;
            border-left-color: var(--accent);
        }

        .nav-item .client-name {
            font-weight: 500;
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .nav-item .client-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        /* --- 右侧主内容区 --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding: 40px;
            scroll-behavior: smooth;
        }

        /* 头部信息 */
        .gallery-header {
            max-width: 1400px;
            margin: 0 auto 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid #333;
            animation: fadeIn 0.6s ease;
        }

        .gallery-header h2 {
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .gallery-header .meta {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .gallery-header p {
            color: var(--text-muted);
            max-width: 700px;
            line-height: 1.8;
        }

        /* 瀑布流相册 (Masonry) */
        .gallery-grid {
            max-width: 1400px;
            margin: 0 auto;
            column-count: 3;
            /* 默认3列 */
            column-gap: var(--gap);
            animation: slideUp 0.6s ease;
        }

        .photo-card {
            break-inside: avoid;
            margin-bottom: var(--gap);
            background: #000;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            cursor: zoom-in;
        }

        .photo-card img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease, opacity 0.4s ease;
            opacity: 0;
            /* 初始隐藏，等JS加载显示 */
        }

        .photo-card img.loaded {
            opacity: 1;
        }

        .photo-card:hover img {
            transform: scale(1.03);
            opacity: 0.8;
        }

        /* 留言区 */
        .comment-wrapper {
            max-width: 900px;
            margin: 80px auto 40px;
            padding: 40px;
            background: var(--bg-panel);
            border-radius: 8px;
            animation: fadeIn 0.8s ease;
        }

        .comment-header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .comment-header h3 {
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* --- 动画 --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* --- 灯箱 --- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .lightbox.active {
            display: flex;
            animation: fadeIn 0.2s;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 95vh;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
        }

        .close-lb {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 50px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .close-lb:hover {
            opacity: 1;
        }

        /* --- 移动端适配 --- */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 3000;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
        }

        @media (max-width: 1024px) {
            .gallery-grid {
                column-count: 2;
            }
        }

        @media (max-width: 768px) {
            .mobile-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;
                height: 100%;
                transform: translateX(-100%);
                box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .gallery-grid {
                column-count: 1;
            }

            .main-content {
                padding: 20px;
                padding-top: 70px;
            }

            .gallery-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1SQY5BDxeqz76pHMB5kbK_FV8Tcpn0otu", o: "https://drive.google.com/uc?export=view&id=1SQY5BDxeqz76pHMB5kbK_FV8Tcpn0otu" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1cCKLOt9XkpX-Xy5DikgCw7y2sIT3Ukm9", o: "https://drive.google.com/uc?export=view&id=1cCKLOt9XkpX-Xy5DikgCw7y2sIT3Ukm9" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1kmBnQ-1Mx9e4bMrIkzDKhyxVjQ_f4eBB", o: "https://drive.google.com/uc?export=view&id=1kmBnQ-1Mx9e4bMrIkzDKhyxVjQ_f4eBB" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1PLLosDbtjYR_KbmNuMjbuuIqu0xeJQUP", o: "https://drive.google.com/uc?export=view&id=1PLLosDbtjYR_KbmNuMjbuuIqu0xeJQUP" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1RP8DitsJCYQq3HuDp47LKHlqNwoQvJGM", o: "https://drive.google.com/uc?export=view&id=1RP8DitsJCYQq3HuDp47LKHlqNwoQvJGM" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1qvVbDPUQGXEVcdNKPOCSQIcqHL0uKj-8", o: "https://drive.google.com/uc?export=view&id=1qvVbDPUQGXEVcdNKPOCSQIcqHL0uKj-8" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1rmxPd4T7wRH1q3ntcLOWj2UZJ9vSR_RF", o: "https://drive.google.com/uc?export=view&id=1rmxPd4T7wRH1q3ntcLOWj2UZJ9vSR_RF" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=15cwQdiL-fPNcRPx8nnjJ6hkSIVSWbq10", o: "https://drive.google.com/uc?export=view&id=15cwQdiL-fPNcRPx8nnjJ6hkSIVSWbq10" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1r4YriZONAqzJSGREuFxTFEp8rWrUfhCi", o: "https://drive.google.com/uc?export=view&id=1r4YriZONAqzJSGREuFxTFEp8rWrUfhCi" },
                        { p: "https://drive.google.com/thumbnail?sz=w1200&id=1KR3elqoyy0iyfyZs3t0tMLMpLF1E3XiD", o: "https://drive.google.com/uc?export=view&id=1KR3elqoyy0iyfyZs3t0tMLMpLF1E3XiD" }
                    ]
                }
            ];
        // ==========================================
        // 🚀 逻辑处理
        // ==========================================

        const navList = document.getElementById('client-list');
        const container = document.getElementById('dynamic-container');
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const mainScroll = document.getElementById('main-scroll');

        // 1. 初始化侧边栏
        function initSidebar() {
            navList.innerHTML = '';
            clientsData.forEach((client, index) => {
                const li = document.createElement('li');
                li.className = `nav-item ${index === 0 ? 'active' : ''}`;
                li.onclick = () => loadClient(index);

                li.innerHTML = `
                    <div class="client-name">${client.name}</div>
                    <div class="client-info">
                        <span>${client.category.split(' ')[0]}</span>
                        <span>${client.date.split(' ')[0]} ${client.date.split(' ')[1]}</span>
                    </div>
                `;
                navList.appendChild(li);
            });
        }

        // 2. 核心：加载客户数据
        function loadClient(index) {
            // 切换选中状态
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            navItems[index].classList.add('active');

            // 移动端收起菜单
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }

            const data = clientsData[index];

            // 构建照片流 HTML (增加 onload 实现渐显效果)
            const photosHtml = data.photos.map(photo => `
                <div class="photo-card" onclick="openLightbox('${photo.o}')">
                    <img src="${photo.p}" alt="photo" onload="this.classList.add('loaded')">
                </div>
            `).join('');

            // 渲染内容
            container.innerHTML = `
                <header class="gallery-header">
                    <div class="meta">
                        <span>${data.category}</span>
                        <span>//</span>
                        <span>${data.date}</span>
                    </div>
                    <h2>${data.name}</h2>
                    <p>${data.desc}</p>
                </header>
                
                <div class="gallery-grid">
                    ${photosHtml}
                </div>

                <div class="comment-wrapper">
                    <div class="comment-header">
                        <h3>客户留言 / Feedback</h3>
                        <span style="font-size:0.8rem; color:#666;">PROJECT ID: ${data.id}</span>
                    </div>
                    <div style="background: #151515; padding: 20px; border-radius: 4px; text-align: center; color: #555;">
                        <p>请在此处接入第三方评论系统 (如 Valine/Disqus)</p>
                        <p style="font-size: 12px; margin-top: 10px;">Current Page ID: ${data.id}</p>
                    </div>
                </div>
            `;

            // 滚动回顶部
            mainScroll.scrollTop = 0;
        }

        // 3. 灯箱逻辑
        function openLightbox(src) {
            // 简单的将缩略图链接转为高清图 (这里Unsplash只要改参数即可)
            // 实际项目中，你的缩略图和原图可能是两个不同的URL
            lbImg.src = src;

            lightbox.classList.add('active');
        }

        function closeLightbox(e) {
            // 点击图片本身不关闭，点击背景才关闭
            if (e.target !== lbImg) {
                lightbox.classList.remove('active');
                lbImg.src = ""; // 清空图片，防止下次打开闪烁
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // 启动
        initSidebar();
        loadClient(0); // 默认加载第一个

    </script>
</body>

</html>
